version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - shinan-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: wsa26
      MYSQL_DATABASE: shinan_news_db
      MYSQL_USER: shinan_user
      MYSQL_PASSWORD: wsa26
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shinan-net

networks:
  shinan-net:
    driver: bridge

volumes:
  db_data:
